name: Deploy to GitHub Pages

# Builds the static export and publishes it to GitHub Pages on every push to main.
# One-time repo setup: Settings → Pages → Source = "GitHub Actions".
# The site serves at https://<owner>.github.io/ghostroster/ — basePath matches the
# repo name; change NEXT_PUBLIC_BASE_PATH below if the repo is named differently.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /ghostroster
          # Optional: set a repo Variable COMMENT_ENDPOINT (a Formspree form URL) to
          # enable the in-app comment box. Unset → the box ships inert (D-010).
          NEXT_PUBLIC_COMMENT_ENDPOINT: ${{ vars.COMMENT_ENDPOINT }}
      - run: touch out/.nojekyll
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
